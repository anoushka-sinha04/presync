<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PreSync | Admin Sign In</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body class="login-body">
  <div class="login-container">
    <div class="login-logo">
      <a href="/"><img src="{{ url_for('static', filename='images/logo.png') }}" alt="PreSync Logo" /></a>
    </div>
    <h2 class="login-title">Admin Access Portal</h2>
    
    <form action="/adminlogin" method="POST" class="login-form">
      <div style="text-align: left; margin-bottom: 1rem;">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Enter admin username" required />
      </div>
      
      <div style="text-align: left; margin-bottom: 1.5rem;">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter admin password" required />
      </div>
      
      <button type="submit" class="primary-btn" style="width: 100%;">Sign In</button>
    </form>

    <div class="login-links">
      <a href="/">← Return to Main Page</a>
      <span style="margin: 0 0.5rem; color: var(--text-light);">|</span>
      <a href="/sign">Create Admin Account</a>
    </div>
  </div>
</body>
</html>
